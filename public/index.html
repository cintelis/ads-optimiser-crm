<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TW AI — Projects & Spaces</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/dashboard.css">
<!-- QR generator (used by Account → Enable MFA). Pure client-side, ~5KB. -->
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
<!-- Markdown rendering for Tasks descriptions and comments. -->
<script src="https://cdn.jsdelivr.net/npm/marked@13.0.3/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.7/dist/purify.min.js"></script>
<!-- Mermaid diagrams inside markdown (```mermaid code blocks). -->
<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
</head>
<body>
<div id="login">
  <div class="login-card">
    <div class="login-logo" id="login-logo-day">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 40" fill="none" width="180" height="32"><circle cx="20" cy="20" r="15" stroke="#C4C4C4" stroke-width="1.5" fill="none"/><circle cx="20" cy="20" r="5" fill="#6E5CCC"/><text x="46" y="25" font-family="'Plus Jakarta Sans',sans-serif" font-weight="600" font-size="18" fill="#0F0F0F" letter-spacing="-0.2">Totally Wild</text></svg>
    </div>
    <div class="login-logo" id="login-logo-night" style="display:none">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 40" fill="none" width="180" height="32"><circle cx="20" cy="20" r="15" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" fill="none"/><circle cx="20" cy="20" r="5" fill="#9B8EE8"/><text x="46" y="25" font-family="'Plus Jakarta Sans',sans-serif" font-weight="600" font-size="18" fill="#FFFFFF" letter-spacing="-0.2">Totally Wild</text></svg>
    </div>
    <div class="login-sub">Projects & Spaces</div>
    <label>Email</label>
    <input id="l-user" type="text" placeholder="you@example.com" autocomplete="username">
    <label>Password</label>
    <input id="l-pass" type="password" placeholder="********" autocomplete="current-password">
    <div class="login-err" id="l-err">Invalid credentials. Try again.</div>
    <button class="login-btn" type="button" onclick="doLogin()">Sign In</button>
  </div>
</div>

<div id="app">
  <div class="layout">
    <aside class="sidebar">
      <div class="s-logo">
        <div class="s-logo-text">Totally Wild AI</div>
        <div class="s-logo-sub">Projects & Spaces</div>
      </div>
      <nav class="s-nav">
        <button class="nav-item active" id="nav-overview" type="button" onclick="nav('overview')">Overview</button>
        <button class="nav-item" id="nav-templates" type="button" onclick="nav('templates')">Templates</button>
        <button class="nav-item" id="nav-contacts" type="button" onclick="nav('contacts')">Contacts</button>
        <button class="nav-item" id="nav-lists" type="button" onclick="nav('lists')">Lists</button>
        <button class="nav-item" id="nav-campaigns" type="button" onclick="nav('campaigns')">Campaigns</button>
        <button class="nav-item" id="nav-logs" type="button" onclick="nav('logs')">Sent Log</button>
        <button class="nav-item" id="nav-unsubs" type="button" onclick="nav('unsubs')">Unsubscribes</button>
        <div class="nav-divider"></div>
        <div class="nav-group-label">CRM</div>
        <button class="nav-item" id="nav-pipeline" type="button" onclick="nav('pipeline')">Pipeline</button>
        <button class="nav-item nav-item-badged" id="nav-followups" type="button" onclick="nav('followups')">
          Follow-ups
          <span id="fu-badge" class="nav-badge" style="display:none"></span>
        </button>
        <div class="nav-divider"></div>
        <div class="nav-group-label">Tasks</div>
        <button class="nav-item" id="nav-projects" type="button" onclick="nav('projects')">Projects</button>
        <div class="nav-divider"></div>
        <div class="nav-group-label">Docs</div>
        <button class="nav-item" id="nav-docs" type="button" onclick="nav('docs')">Spaces</button>
        <div class="nav-divider"></div>
        <div class="nav-group-label">Settings</div>
        <button class="nav-item" id="nav-account" type="button" onclick="nav('account')">My Account</button>
        <button class="nav-item" id="nav-users" type="button" onclick="nav('users')" style="display:none">Users</button>
        <button class="nav-item" id="nav-integrations" type="button" onclick="nav('integrations')" style="display:none">Integrations</button>
        <button class="nav-item" id="nav-feature-settings" type="button" onclick="nav('feature_settings')" style="display:none">Feature visibility</button>
      </nav>
      <div class="s-footer">
        <button class="btn btn-ghost btn-sm" style="width:100%;justify-content:center" onclick="doLogout()">Sign Out</button>
      </div>
    </aside>
    <div class="main">
      <div class="topbar">
        <div class="page-title" id="page-title">Overview</div>
        <div class="topbar-search" id="topbar-search">
          <svg class="topbar-search-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z" fill="currentColor"/></svg>
          <input id="global-search-input" type="search" placeholder="Search issues, pages, contacts…  ( / )" autocomplete="off" oninput="onGlobalSearchInput(this.value)" onfocus="onGlobalSearchFocus()">
          <div class="global-search-dropdown" id="global-search-dropdown"></div>
        </div>
        <div class="topbar-actions">
          <button class="btn btn-ghost btn-sm mobile-only" type="button" onclick="openMobileMenu()">More</button>
          <button class="topbar-bell" id="inbox-bell" type="button" onclick="toggleInbox(event)" title="Notifications" aria-label="Notifications">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2a6 6 0 0 0-6 6v3.5l-1.7 3.4A1 1 0 0 0 5.2 16h13.6a1 1 0 0 0 .9-1.1L18 11.5V8a6 6 0 0 0-6-6zm-2 16a2 2 0 1 0 4 0h-4z" fill="currentColor"/></svg>
            <span class="topbar-bell-badge" id="inbox-badge" style="display:none">0</span>
          </button>
          <button class="icon-btn icon-btn-ghost" id="theme-toggle" type="button" onclick="toggleTheme()" title="Toggle light/dark theme" aria-label="Toggle theme"></button>
          <button class="btn btn-ghost btn-sm" type="button" onclick="refreshCurrent()">Refresh</button>
        </div>
      </div>
      <div class="content" id="content"></div>
    </div>
  </div>

  <nav class="mobile-tabbar" id="mobile-tabbar">
    <button class="mobile-tab active" id="tab-overview" type="button" onclick="nav('overview')">Overview</button>
    <button class="mobile-tab" id="tab-contacts" type="button" onclick="nav('contacts')">Contacts</button>
    <button class="mobile-tab" id="tab-pipeline" type="button" onclick="nav('pipeline')">Pipeline</button>
    <button class="mobile-tab mobile-tab-badged" id="tab-followups" type="button" onclick="nav('followups')">
      Follow-ups
      <span id="mobile-fu-badge" class="nav-badge" style="display:none"></span>
    </button>
    <button class="mobile-tab" id="tab-more" type="button" onclick="openMobileMenu()">More</button>
  </nav>
</div>

<div class="mobile-sheet-bg" id="mobile-sheet-bg" onclick="closeMobileMenu()"></div>
<div class="mobile-sheet" id="mobile-sheet">
  <div class="mobile-sheet-head">
    <div>
      <div class="mobile-sheet-title">More</div>
      <div class="mobile-sheet-sub">Secondary sections and account actions</div>
    </div>
    <button class="modal-close" type="button" onclick="closeMobileMenu()">x</button>
  </div>
  <div class="mobile-sheet-body">
    <button class="mobile-sheet-item" id="more-templates" type="button" onclick="closeMobileMenu();nav('templates')">Templates</button>
    <button class="mobile-sheet-item" id="more-lists" type="button" onclick="closeMobileMenu();nav('lists')">Lists</button>
    <button class="mobile-sheet-item" id="more-campaigns" type="button" onclick="closeMobileMenu();nav('campaigns')">Campaigns</button>
    <button class="mobile-sheet-item" id="more-logs" type="button" onclick="closeMobileMenu();nav('logs')">Sent Log</button>
    <button class="mobile-sheet-item" id="more-unsubs" type="button" onclick="closeMobileMenu();nav('unsubs')">Unsubscribes</button>
    <button class="mobile-sheet-item" id="more-projects" type="button" onclick="closeMobileMenu();nav('projects')">Projects</button>
    <button class="mobile-sheet-item" id="more-docs" type="button" onclick="closeMobileMenu();nav('docs')">Docs</button>
    <button class="mobile-sheet-item" id="more-account" type="button" onclick="closeMobileMenu();nav('account')">My Account</button>
    <button class="mobile-sheet-item" id="more-users" type="button" onclick="closeMobileMenu();nav('users')" style="display:none">Users</button>
    <button class="mobile-sheet-item" id="more-integrations" type="button" onclick="closeMobileMenu();nav('integrations')" style="display:none">Integrations</button>
    <button class="mobile-sheet-item" id="more-feature-settings" type="button" onclick="closeMobileMenu();nav('feature_settings')" style="display:none">Feature visibility</button>
    <button class="mobile-sheet-item" type="button" onclick="closeMobileMenu();refreshCurrent()">Refresh Current Page</button>
    <button class="mobile-sheet-item mobile-sheet-item-danger" type="button" onclick="doLogout()">Sign Out</button>
  </div>
</div>

<div class="modal-bg" id="modal"><div class="modal modal-lg" id="modal-inner"></div></div>

<div class="drawer-bg" id="drawer-bg" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-head">
    <div>
      <div id="drawer-name" style="font-family:var(--font-head);font-size:18px;font-weight:700"></div>
      <div id="drawer-company" style="font-size:13px;color:var(--muted2);margin-top:2px"></div>
    </div>
    <button class="modal-close" type="button" onclick="closeDrawer()" style="font-size:22px">x</button>
  </div>
  <div class="drawer-body" id="drawer-body"></div>
</div>

<script src="/app.js" defer></script>
<script src="/tasks-ui.js" defer></script>
<script src="/sprints-ui.js" defer></script>
<script src="/docs-ui.js" defer></script>
<script src="/notifications-ui.js" defer></script>
<script src="/integrations-ui.js" defer></script>
<script src="/attachments-ui.js" defer></script>
<script src="/linked-items-ui.js" defer></script>
<script src="/feature-settings-ui.js" defer></script>
<script src="/toasts.js" defer></script>
<script src="/markdown-toolbar.js" defer></script>
<script src="/empty-states.js" defer></script>
<script src="/dashboard-widgets.js" defer></script>
<script src="/global-search.js" defer></script>
<script src="/router.js" defer></script>
</body>
</html>
